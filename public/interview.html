<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Interview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-dot {
      width: 10px; height: 10px;
      background: #2E5FA3;
      border-radius: 50%;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
    header span { font-size: 13px; color: #9ca3af; margin-left: auto; }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
    }
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .avatar.consultant { background: #2E5FA3; color: white; }
    .avatar.user { background: #e5e7eb; color: #374151; }
    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      color: #1a1a2e;
    }
    .message.consultant .bubble {
      background: white;
      border: 1px solid #e5e7eb;
      border-top-left-radius: 4px;
    }
    .message.user .bubble {
      background: #2E5FA3;
      color: white;
      border-top-right-radius: 4px;
    }
    .typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
    .typing span {
      width: 7px; height: 7px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: none; }
      30% { transform: translateY(-5px); }
    }
    #input-area {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 16px 24px;
      flex-shrink: 0;
    }
    #input-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #2E5FA3; }
    #send-btn {
      padding: 12px 20px;
      background: #2E5FA3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    #send-btn:hover:not(:disabled) { background: #24508f; }
    #send-btn:disabled { background: #9ca3af; cursor: default; }
    #summary-btn {
      display: none;
      width: 100%;
      padding: 14px;
      background: #059669;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    #summary-btn:hover { background: #047857; }
    /* Summary panel */
    #summary-panel {
      display: none;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      max-width: 760px;
      width: calc(100% - 48px);
      margin: 0 auto 16px;
    }
    #summary-panel h2 { font-size: 16px; color: #1a1a2e; margin-bottom: 4px; }
    #summary-panel .sub { font-size: 13px; color: #6b7280; margin-bottom: 20px; }
    .ratings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .rating-item {
      background: #f8f9fc;
      border-radius: 8px;
      padding: 12px;
    }
    .rating-item .label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .rating-item .score { font-size: 22px; font-weight: 700; color: #2E5FA3; }
    .rating-item .score span { font-size: 13px; color: #9ca3af; font-weight: 400; }
    .section-title { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .tag {
      background: #eff6ff;
      color: #2E5FA3;
      border: 1px solid #bfdbfe;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
    }
    .tag.concern { background: #fff7ed; color: #c2410c; border-color: #fed7aa; }
    .tag.focus { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    #submit-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #2E5FA3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    #submit-btn:hover:not(:disabled) { background: #24508f; }
    #submit-btn:disabled { background: #9ca3af; cursor: default; }
    /* Thank you screen */
    #thankyou {
      display: none;
      text-align: center;
      padding: 48px 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    #thankyou .icon {
      width: 64px; height: 64px;
      background: #dcfce7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    #thankyou h2 { font-size: 22px; color: #1a1a2e; margin-bottom: 12px; }
    #thankyou p { font-size: 15px; color: #6b7280; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <div class="header-dot"></div>
    <h1>Transformation Diagnostic</h1>
    <span>Confidential</span>
  </header>

  <div id="chat-container"></div>

  <div id="summary-panel">
    <h2>Your Diagnostic Summary</h2>
    <p class="sub">Review your summary below, then submit to complete your participation.</p>
    <div id="ratings-grid" class="ratings-grid"></div>
    <div class="section-title">Key Strengths</div>
    <div id="strengths-list" class="tag-list"></div>
    <div class="section-title">Key Concerns</div>
    <div id="concerns-list" class="tag-list"></div>
    <div class="section-title">Recommended Focus Areas</div>
    <div id="focus-list" class="tag-list"></div>
    <button id="submit-btn" onclick="submitSummary()">Submit My Response</button>
  </div>

  <div id="input-area">
    <div id="input-inner">
      <button id="summary-btn" onclick="generateSummary()">Generate &amp; Submit Summary</button>
    </div>
    <div id="input-inner">
      <textarea id="user-input" placeholder="Type your response…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const DIMENSION_LABELS = {
      visionStrategy: 'Vision & Strategy',
      leadershipSponsorship: 'Leadership & Sponsorship',
      governanceDecisionMaking: 'Governance',
      deliveryExecution: 'Delivery & Execution',
      changeManagementPeople: 'Change & People',
      stakeholderEngagement: 'Stakeholder Engagement'
    };

    let messages = [];
    let parsedSummary = null;
    let submitted = false;

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function appendMessage(role, content) {
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const initial = role === 'consultant' ? 'C' : 'You';
      div.innerHTML = `
        <div class="avatar ${role}">${initial}</div>
        <div class="bubble">${content.replace(/\n/g, '<br>')}</div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = 'message consultant';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="avatar consultant">C</div>
        <div class="bubble typing"><span></span><span></span><span></span></div>
      `;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      input.value = '';
      input.style.height = 'auto';

      appendMessage('user', text);
      messages.push({ role: 'user', content: text });

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        removeTyping();

        if (data.error) throw new Error(data.error);

        messages.push({ role: 'assistant', content: data.content });
        appendMessage('consultant', data.content);

        // Show summary button once conversation is underway (5+ turns)
        if (messages.length >= 10) {
          document.getElementById('summary-btn').style.display = 'block';
        }
      } catch (err) {
        removeTyping();
        appendMessage('consultant', 'Sorry, something went wrong. Please try again.');
        console.error(err);
      }

      sendBtn.disabled = false;
      input.focus();
    }

    async function generateSummary() {
      const btn = document.getElementById('summary-btn');
      btn.disabled = true;
      btn.textContent = 'Generating summary…';

      // Ask Claude to generate the structured JSON summary
      messages.push({ role: 'user', content: 'GENERATE_SUMMARY' });

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        parsedSummary = JSON.parse(data.content);
        renderSummary(parsedSummary);

        document.getElementById('input-area').style.display = 'none';
        document.getElementById('summary-panel').style.display = 'block';
        document.getElementById('chat-container').scrollTop = 0;
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Generate & Submit Summary';
        alert('Could not generate summary. Please continue the conversation and try again.');
      }
    }

    function renderSummary(s) {
      const grid = document.getElementById('ratings-grid');
      grid.innerHTML = '';
      Object.entries(s.ratings || {}).forEach(([key, val]) => {
        const label = DIMENSION_LABELS[key] || key;
        grid.innerHTML += `
          <div class="rating-item">
            <div class="label">${label}</div>
            <div class="score">${val}<span>/5</span></div>
          </div>`;
      });

      const strengthsList = document.getElementById('strengths-list');
      strengthsList.innerHTML = (s.keyStrengths || []).map(t => `<span class="tag">${t}</span>`).join('');

      const concernsList = document.getElementById('concerns-list');
      concernsList.innerHTML = (s.keyConcerns || []).map(t => `<span class="tag concern">${t}</span>`).join('');

      const focusList = document.getElementById('focus-list');
      focusList.innerHTML = (s.recommendedFocusAreas || []).map(t => `<span class="tag focus">${t}</span>`).join('');
    }

    async function submitSummary() {
      if (!parsedSummary || submitted) return;
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting…';

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ summary: parsedSummary })
        });
        const data = await res.json();
        if (!data.success) throw new Error('Submit failed');

        submitted = true;
        document.getElementById('summary-panel').style.display = 'none';
        document.getElementById('chat-container').innerHTML = '';
        const ty = document.createElement('div');
        ty.id = 'thankyou';
        ty.innerHTML = `
          <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="#16a34a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
          <h2>Thank you for your input</h2>
          <p>Your response has been submitted. Your insights will be compiled with others and fed back as aggregated findings — nothing will be attributed to you individually.</p>
        `;
        ty.style.display = 'block';
        document.getElementById('chat-container').appendChild(ty);
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'Submit My Response';
        alert('Submission failed. Please try again.');
      }
    }

    // Start the conversation on load
    window.addEventListener('load', async () => {
      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      showTyping();

      try {
        messages.push({ role: 'user', content: 'Hello, I am ready to begin the diagnostic interview.' });
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        removeTyping();
        messages.push({ role: 'assistant', content: data.content });
        appendMessage('consultant', data.content);
      } catch (err) {
        removeTyping();
        appendMessage('consultant', 'Hello! Welcome to the diagnostic. Unfortunately I had trouble connecting — please refresh the page to try again.');
      }

      sendBtn.disabled = false;
      document.getElementById('user-input').focus();
    });
  </script>
</body>
</html>
